# Render Blueprint — defines both services for the Ulti game.
# Render reads this file when you create a new Blueprint from the repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  # --- Backend: Node + Express + Socket.io (long-running, in-memory game state) ---
  - type: web
    name: ulti-server
    runtime: node
    plan: free
    # Install all workspace deps from the repo root, then start just the server.
    buildCommand: npm install
    startCommand: npm start --workspace=server
    healthCheckPath: /
    envVars:
      # The client's public URL — locks down CORS. Set this AFTER the client
      # is deployed and you know its URL, then redeploy the server.
      - key: CLIENT_URL
        sync: false

  # --- Frontend: Next.js client ---
  - type: web
    name: ulti-client
    runtime: node
    plan: free
    # NEXT_PUBLIC_* vars are baked in at build time, so the server URL must be
    # present before `next build` runs (it is — Render injects env at build).
    buildCommand: npm install && npm run build --workspace=client
    startCommand: npm start --workspace=client
    envVars:
      # The server's public URL. Set this to the ulti-server URL Render assigns.
      - key: NEXT_PUBLIC_SERVER_URL
        sync: false
